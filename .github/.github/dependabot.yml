version: 2

updates:
  # =========================
  # NPM DEPENDENCIES
  # =========================
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "04:00"
      timezone: "Asia/Kolkata"

    # Limit PR noise
    open-pull-requests-limit: 8

    # Security + version strategy
    versioning-strategy: increase

    # Enable security updates
    allow:
      - dependency-type: "all"

    # Ignore risky major updates (manual review needed)
    ignore:
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@prisma/client"
        update-types: ["version-update:semver-major"]
      - dependency-name: "prisma"
        update-types: ["version-update:semver-major"]

    # Group updates (reduces PR spam massively)
    groups:
      ui-libraries:
        patterns:
          - "@radix-ui/*"
          - "lucide-react"
          - "@tabler/icons-react"
          - "framer-motion"
          - "motion"
          - "recharts"
          - "sonner"

      state-and-forms:
        patterns:
          - "zustand"
          - "react-hook-form"
          - "@hookform/resolvers"
          - "zod"

      backend-services:
        patterns:
          - "@supabase/*"
          - "@upstash/*"
          - "pusher"
          - "pusher-js"
          - "svix"

      core-framework:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "next-themes"

      utilities:
        patterns:
          - "clsx"
          - "class-variance-authority"
          - "tailwind-merge"
          - "uuid"
          - "date-fns"

      prisma-stack:
        patterns:
          - "prisma"
          - "@prisma/client"

    # Auto-labeling
    labels:
      - "dependencies"
      - "npm"

    # Commit message standardization
    commit-message:
      prefix: "deps"
      include: "scope"

  # =========================
  # 🔹 DEV DEPENDENCIES
  # =========================
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "05:00"
      timezone: "Asia/Kolkata"

    open-pull-requests-limit: 5

    dependency-type: "development"

    groups:
      tooling:
        patterns:
          - "eslint*"
          - "@types/*"
          - "typescript"
          - "dotenv"
          - "babel-plugin-react-compiler"

      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "tw-animate-css"

    labels:
      - "dev-dependencies"

    commit-message:
      prefix: "chore"
      include: "scope"

  # =========================
  # GITHUB ACTIONS (SECURITY)
  # =========================
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "06:00"
      timezone: "Asia/Kolkata"

    labels:
      - "github-actions"
      - "ci-cd"

    commit-message:
      prefix: "ci"
      include: "scope"